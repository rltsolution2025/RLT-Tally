<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Ledger book -->
  <rect x="420" y="180" width="180" height="120" rx="10" fill="#ffffff" opacity="0.35"></rect>
  <line x1="450" y1="210" x2="570" y2="210" stroke="#ffffff" stroke-width="4" opacity="0.35"></line>
  <line x1="450" y1="240" x2="570" y2="240" stroke="#ffffff" stroke-width="4" opacity="0.35"></line>

  <!-- Calculator -->
  <rect x="480" y="310" width="110" height="140" rx="12" fill="#ffffff" opacity="0.30"></rect>
  <circle cx="515" cy="350" r="8" fill="#ffffff" opacity="0.35"></circle>
  <circle cx="545" cy="350" r="8" fill="#ffffff" opacity="0.35"></circle>
  <circle cx="575" cy="350" r="8" fill="#ffffff" opacity="0.35"></circle>

  <!-- Bar chart -->
  <rect x="300" y="300" width="35" height="90" fill="#ffffff" opacity="0.30"></rect>
  <rect x="350" y="260" width="35" height="130" fill="#ffffff" opacity="0.30"></rect>
  <rect x="400" y="230" width="35" height="160" fill="#ffffff" opacity="0.30"></rect>

  <!-- Invoice paper -->
  <rect x="260" y="180" width="100" height="120" rx="8" fill="#ffffff" opacity="0.28"></rect>
  <line x1="275" y1="210" x2="340" y2="210" stroke="#ffffff" stroke-width="3" opacity="0.30"></line>
  <line x1="275" y1="235" x2="340" y2="235" stroke="#ffffff" stroke-width="3" opacity="0.30"></line>

  <!-- Growth arrow -->
  <path d="M240 340 L300 280 L360 310 L420 260" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.35"></path>
  <polygon points="420,260 410,260 415,245" fill="#ffffff" opacity="0.35"></polygon>
</svg>